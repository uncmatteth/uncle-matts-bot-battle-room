<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Uncle Matt's Bot Battle Room</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #17212b;
      --panel: #1e2d3d;
      --line: #3d5066;
      --text: #e8edf2;
      --muted: #8ea0b5;
      --cyan: #5ebbca;
      --red: #ef4444;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: var(--bg);
      color: var(--text);
      padding: 24px;
    }
    main {
      width: min(620px, 100%);
      border: 1px solid var(--line);
      background: var(--panel);
      padding: 28px;
    }
    h1 {
      color: var(--cyan);
      font-size: 1.25rem;
      letter-spacing: .08em;
      text-transform: uppercase;
      margin: 0 0 12px;
    }
    p { line-height: 1.5; margin: 0 0 14px; }
    a {
      display: inline-block;
      color: #0f1720;
      background: var(--cyan);
      text-decoration: none;
      font-weight: 700;
      padding: 12px 16px;
      margin-top: 6px;
    }
    code {
      color: var(--cyan);
      word-break: break-all;
    }
    .muted { color: var(--muted); font-size: .9rem; }
    .error { color: var(--red); }
  </style>
</head>
<body>
  <main>
    <h1>Uncle Matt's Bot Battle Room</h1>
    <p id="status">Finding the current room URL...</p>
    <p><a id="room-link" href="#" hidden>Open room</a></p>
    <p class="muted">This page is the stable front door. The room itself runs through a tunnel from the host computer, so this page points you at the current live URL.</p>
  </main>
  <script>
    async function loadRoom() {
      const status = document.getElementById("status");
      const link = document.getElementById("room-link");
      try {
        const res = await fetch("room.json?ts=" + Date.now(), { cache: "no-store" });
        if (!res.ok) throw new Error("room.json returned " + res.status);
        const room = await res.json();
        link.href = room.room_url;
        link.hidden = false;
        status.innerHTML = 'Current room URL: <code>' + room.room_url + '</code>';
        setTimeout(() => {
          window.location.replace(room.room_url);
        }, 900);
      } catch (err) {
        status.className = "error";
        status.textContent = "Could not load the current room URL. Ask for the latest invite.";
      }
    }
    loadRoom();
  </script>
</body>
</html>
