services:
  - type: web
    name: uncle-matts-bot-battle-room
    runtime: docker
    plan: free
    rootDir: server
    dockerfilePath: ./Dockerfile
    healthCheckPath: /healthz
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: DATABASE_SSL
        value: "true"
      - key: AGENT_ROOM_CODE
        sync: false
      - key: CORS_ORIGINS
        sync: false
